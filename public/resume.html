<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume - Deepanshu Singla</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #222;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    .resume-header {
      width: 100%;
      background: #222;
      color: #fff;
      padding: 1rem 0;
      text-align: center;
      font-size: 1.3rem;
      font-weight: bold;
      letter-spacing: 0.05em;
    }
    .resume-container {
      width: 100%;
      max-width: 900px;
      margin: 2rem auto 1rem auto;
      background: #fff;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      border-radius: 8px;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .resume-embed {
      width: 100%;
      height: 80vh;
      border: none;
      margin-bottom: 1.5rem;
    }
    .download-btn {
      display: inline-block;
      padding: 12px 28px;
      background: #222;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.2s;
      cursor: pointer;
    }
    .download-btn:hover {
      background: #444;
    }
  </style>
</head>
<body>
  <div class="resume-header">Deepanshu Singla - Resume</div>
  <div class="resume-container">
    <iframe class="resume-embed" src="/resume_deepanshu_singla.pdf"></iframe>
    <a class="download-btn" href="/resume_deepanshu_singla.pdf" download="Deepanshu_Singla_Resume.pdf">Download PDF</a>
  </div>
</body>
</html>
